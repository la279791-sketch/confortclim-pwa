<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8">
 <title>Ordem de Serviço - ConfortClim</title>

 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <meta name="theme-color" content="#0A4E8A">

 <link rel="manifest" href="manifest.json">
 <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
 <h1>Ordem de Serviço</h1>
</header>

<main>
<form id="osForm">

<section>
 <h2>Cliente</h2>
 <input id="clienteNome" placeholder="Nome do cliente" required>
 <input id="clienteTelefone" placeholder="Telefone">
 <input id="clienteEndereco" placeholder="Endereço">
</section>

<section>
 <h2>Serviço</h2>
 <input type="date" id="dataServico">
 <input type="time" id="horaServico">
 <input type="date" id="validadeServico">
 <select id="tipoServico" required>
 <option value="">Tipo de serviço</option>
 <option value="Instalação">Instalação</option>
 <option value="Manutenção Preventiva">Manutenção Preventiva</option>
 <option value="Manutenção Corretiva">Manutenção Corretiva</option>
 <option value="Outros">Outros</option>
 </select>
</section>

<section>
 <h2>Equipamento</h2>
 <input id="marca" placeholder="Marca">
 <input id="modelo" placeholder="Modelo">
 <input id="capacidade" placeholder="BTUs">
</section>

<section>
 <h2>Checklist</h2>
 <div id="checklist" class="checklist-safe"></div>
</section>

<section>
 <h2>Descrição</h2>
 <textarea id="descricao"></textarea>
</section>

<section>
 <h2>Materiais</h2>
 <textarea id="materiais"></textarea>
</section>

<section>
 <h2>Valores</h2>
 <input id="valor" placeholder="Valor R$">
 <input id="pagamento" placeholder="Forma de pagamento">
</section>

<section>
 <h2>Assinaturas</h2>
 <label>Cliente</label>
 <canvas id="assinaturaCliente"></canvas>
 <button type="button" onclick="limparCanvas('assinaturaCliente')">Limpar</button>

 <label>Técnico</label>
 <canvas id="assinaturaTecnico"></canvas>
 <button type="button" onclick="limparCanvas('assinaturaTecnico')">Limpar</button>
</section>

<button type="submit">SALVAR ORDEM DE SERVIÇO</button>

</form>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>

<script>
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('./sw.js');
}
</script>

</body>
</html>
